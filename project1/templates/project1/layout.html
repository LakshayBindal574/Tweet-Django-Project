{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Tweet App{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<nav class="navbar navbar-expand-lg navbar-dark bg-black px-3">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'tweet_list' %}">TweetApp</a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- Center Search Bar -->
            <form class="d-flex mx-auto my-2 my-lg-0" style="max-width: 500px; width: 100%;" method="GET" action="{% url 'tweet_list' %}">
                <input class="form-control me-2" type="search" name="q" placeholder="Search tweets or users..." aria-label="Search" value="{{ query|default:'' }}">
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>

            <!-- Right Actions -->
            <div class="d-flex align-items-center ms-auto">
                {% if user.is_authenticated %}
                    <span class="me-3 text-white">Hello, <strong>{{ user.username }}</strong></span>
                    <a href="{% url 'logout' %}" class="btn btn-sm btn-danger">
                        Logout
                    </a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-sm btn-outline-light me-2">
                        Login
                    </a>
                    <a href="{% url 'register' %}" class="btn btn-sm btn-success">
                        Register
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% if messages %}
        <div class="mt-3">
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% else %}info{% endif %} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
