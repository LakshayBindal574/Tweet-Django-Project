{% extends 'project1/layout.html' %}

{% block title %}Delete Tweet{% endblock %}

{% block content %}

<h3>Are you sure you want to delete this tweet?</h3>

<p>{{ tweet.text }}</p>

{% if tweet.photo %}
    <img src="{{ tweet.photo.url }}" class="img-fluid mb-3">
{% endif %}

<form method="POST">
    {% csrf_token %}
    <button class="btn btn-danger">Yes Delete</button>
    <a href="{% url 'tweet_list' %}" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}
